services:
  app:
    image: ${APP_IMAGE:-sunjae1/shopping-app:latest}
    pull_policy: always
    container_name: shopping-app
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    volumes:
      - ./UploadFolder:/app/UploadFolder
