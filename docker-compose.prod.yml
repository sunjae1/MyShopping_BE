services:
  redis:
    image: redis:7-alpine
    container_name: shopping-redis-prod
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  app:
    image: ${APP_IMAGE:-sunjae1/shopping-app:latest}
    pull_policy: always
    container_name: shopping-app
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      REDIS_HOST: redis
    depends_on:
      - redis

volumes:
  redis-data:
